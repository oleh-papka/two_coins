{% extends 'base.html' %}

{% block title %}🪙 2coins | Login{% endblock %}

{% block body %}
    <div id="login-wrapper" class="d-flex justify-content-center align-items-center vh-100">

        <div class="card col-3" style="max-width: 600px; min-width: 400px; margin: 0 auto;">
            <div class="card-body p-4">
                <h1 class="text-center mb-4">🪙 2coins Login</h1>
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="id_email" name="email"
                               placeholder="name@example.com"
                               autocomplete="email" required>

                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="id_password" name="password"
                               placeholder="Password"
                               autocomplete="current-password" required>
                    </div>

                    <button class="btn btn-primary w-100 my-2" type="submit">
                        Log in
                    </button>

                    <div class="login-footer">
                        Don’t have an account?
                        <a href="{% url 'register' %}">Create one</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
{% endblock %}
