{% extends 'base.html' %}

{% block title %}2coins | Login{% endblock %}

{% block extra_css %}
    <style>
        body {
            min-height: 100vh;
            background: #f8fafc;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 1rem;
            box-shadow: 0 0.75rem 2rem rgba(0, 0, 0, 0.06);
            padding: 2rem;
        }

        .login-brand {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 1.75rem;
        }

        .form-floating + .form-floating {
            margin-top: 1rem;
        }

        .btn-login {
            padding-top: 0.8rem;
            padding-bottom: 0.8rem;
            font-weight: 500;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.95rem;
            color: #6c757d;
        }

        .login-footer a {
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
{% endblock %}

{% block body %}
    <div class="login-wrapper">
        <main class="login-card">
            <form method="post">
                {% csrf_token %}

                <div class="login-brand">2coins</div>
                <p class="login-subtitle">Sign in to your account</p>

                <div class="form-floating">
                    <input
                            type="email"
                            class="form-control"
                            id="floatingInput"
                            name="email"
                            placeholder="name@example.com"
                            autocomplete="email"
                            required
                    >
                    <label for="floatingInput">Email address</label>
                </div>

                <div class="form-floating my-4">
                    <input
                            type="password"
                            class="form-control"
                            id="floatingPassword"
                            name="password"
                            placeholder="Password"
                            autocomplete="current-password"
                            required
                    >
                    <label for="floatingPassword">Password</label>
                </div>

                <button class="btn btn-primary w-100 btn-login" type="submit">
                    Sign in
                </button>

                <div class="login-footer">
                    Don’t have an account?
                    <a href="{% url 'register' %}">Create one</a>
                </div>
            </form>
        </main>
    </div>
{% endblock %}
